<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream Travel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
position:sticky;
top:0;
}

header h2{
letter-spacing:2px;
}

nav a{
color:rgb(248, 246, 246);
text-decoration:none;
margin:0 15px;
transition:0.3s;
}

nav a:hover{
color:#00f2ff;
}

/* HERO */

.hero{
height:90vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
background:url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e") center/cover;
animation:fade 2s;
}

.hero h1{
font-size:60px;
margin-bottom:15px;
}

.hero button{
padding:12px 25px;
border:none;
border-radius:30px;
background:#00eaff;
color:black;
font-weight:bold;
cursor:pointer;
transition:0.4s;
}

.hero button:hover{
transform:scale(1.1);
}

/* GALLERY */

.gallery{
padding:80px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.gallery img{
width:100%;
border-radius:15px;
transition:0.5s;
box-shadow:0 0 15px rgba(0,0,0,0.5);
}

.gallery img:hover{
transform:scale(1.08);
}

/* VIDEO SECTION */

.video-section{
padding:60px;
text-align:center;
}

.video-container{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
}

video{
width:350px;
border-radius:15px;
box-shadow:0 0 20px #00eaff;
}

/* IFRAME */

.iframe-section{
text-align:center;
padding:60px;
}

iframe{
border-radius:15px;
box-shadow:0 0 20px #00eaff;
}

/* AUDIO */

.audio-section{
text-align:center;
padding:60px;
}

audio{
margin-top:20px;
}

/* FOOTER */

footer{
text-align:center;
padding:20px;
background:black;
}

/* ANIMATION */

@keyframes fade{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<header>
